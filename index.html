<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaxiCheck 4.0</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- LOGIN -->
    <section id="loginTela" class="tela-login">

        <div class="ticket-card">

            <div class="ticket-listras"></div>

            <div class="logo-login">
                <img src="assets/logo.png" alt="Logo TaxiCheck">
            </div>

            <h1>TaxiCheck 4.0</h1>

            <p class="subtitulo">
                Sistema de conferência de corridas
            </p>

            <input
                type="email"
                id="usuario"
                placeholder="E-mail"
                autocomplete="username">

            <input
                type="password"
                id="senha"
                placeholder="Senha"
                autocomplete="current-password">

            <button onclick="entrar()">
                Entrar
            </button>

            <p id="mensagem"></p>

        </div>

    </section>


    <!-- DASHBOARD -->
    <section id="dashboard" class="app-shell escondido">

        <aside class="sidebar">

            <div class="sidebar-topo">
                <img src="assets/logo.png" alt="Logo TaxiCheck" class="sidebar-logo">
                <span class="sidebar-titulo">TaxiCheck<em>4.0</em></span>
            </div>

            <nav class="sidebar-nav">

                <button class="nav-item" onclick="ativarMenu(this); organizarPlanilha()">
                    <span class="nav-icone">⇄</span>
                    Organizar Planilha
                </button>

                <button class="nav-item ativo" onclick="ativarMenu(this); comparar()">
                    <span class="nav-icone">▤</span>
                    Comparar Planilhas
                </button>

                <button class="nav-item" onclick="ativarMenu(this); verHistorico()">
                    <span class="nav-icone">◷</span>
                    Histórico
                </button>

                <button class="nav-item" onclick="ativarMenu(this); configuracoes()">
                    <span class="nav-icone">⚙</span>
                    Configurações
                </button>

            </nav>

            <button class="sidebar-sair" onclick="sair()">
                Sair
            </button>

        </aside>

        <main class="conteudo">

            <header class="conteudo-topo">
                <div>
                    <span class="eyebrow">Dashboard</span>
                    <h1>Bem-vindo ao TaxiCheck 4.0</h1>
                </div>
            </header>

            <div id="resultado" class="conteudo-corpo"></div>

        </main>

    </section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script src="js/app.js"></script>

</body>

</html>
